version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cqrs_demo_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - app-network

  # User Service
  user-service:
    build:
      context: ../../
      dockerfile: ../../apps/user-service/Dockerfile.dev
    container_name: user-service-dev
    environment:
      NODE_ENV: dev
      DB_URL: postgresql://postgres:postgres@postgres:5432/cqrs_demo_dev
      JWT_SECRET: supersecret-change-me-in-production
      USER_SERVICE_PORT: 3101
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9092
    ports:
      - '3101:3101'
    depends_on:
      - postgres
      - kafka-1
      - kafka-2
    networks:
      - app-network

  # Product Service
  product-service:
    build:
      context: ../../
      dockerfile: ../../apps/product-service/Dockerfile.dev
    container_name: product-service-dev
    environment:
      NODE_ENV: dev
      DB_URL: postgresql://postgres:postgres@postgres:5432/cqrs_demo_dev
      PRODUCT_SERVICE_PORT: 3102
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9092
    ports:
      - '3102:3102'
    depends_on:
      - postgres
      - kafka-1
      - kafka-2
    networks:
      - app-network

  # Kafka Brokers
  kafka-1:
    extends:
      file: ../../infra/kafka/docker-compose.yml
    service: kafka-1
    networks:
      - app-network

  kafka-2:
    extends:
      file: ../../infra/kafka/docker-compose.yml
    service: kafka-2
    networks:
      - app-network

volumes:
  postgres_dev_data:

networks:
  app-network:
    driver: bridge
